name: Release native packages

on:
  workflow_dispatch:
    inputs:
      package_revision:
        description: Numeric SDL3-CS release revision; the manifest may remap occupied component package revisions.
        required: true
        default: "1"
      managed_only:
        description: Build and publish only the managed SDL3-CS package without running the native matrix.
        required: true
        type: boolean
        default: false
      native_package_revision:
        description: Already published native package revision used by managed-only tests and consumers.
        required: true
        default: "1"
      base_release_ref:
        description: Previous release ref used to prove that native inputs did not change for managed-only releases.
        required: true
        default: "v3.4.12.1"
      build_parallel_level:
        description: CMake build parallel level for constrained hosted runners.
        required: true
        default: "2"
      require_upstream_current:
        description: Fail assembly when forks are not current with libsdl-org upstream main.
        required: true
        type: boolean
        default: false
      publish_github:
        description: Create the GitHub release after package assembly.
        required: true
        type: boolean
        default: false
      publish_nuget:
        description: Push packages to NuGet after package assembly.
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

env:
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

jobs:
  plan:
    name: Plan native matrix
    if: ${{ !inputs.managed_only }}
    runs-on: ubuntu-latest
    outputs:
      native_matrix: ${{ steps.native-matrix.outputs.native_matrix }}
      bundle_count: ${{ steps.native-matrix.outputs.bundle_count }}

    steps:
      - name: Checkout SDL3-CS
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build matrix from release manifest
        id: native-matrix
        shell: pwsh
        run: |
          $manifest = Get-Content -LiteralPath '.github/release-tools/release-manifest.json' -Raw | ConvertFrom-Json -Depth 64
          $include = @($manifest.rids | ForEach-Object {
            [ordered]@{
              rid = $_.rid
              runner = $_.runner
              allow_cross_compile = ($_.os -eq 'windows' -and $_.arch -eq 'x86')
            }
          })
          $matrix = @{ include = $include } | ConvertTo-Json -Depth 8 -Compress
          "native_matrix=$matrix" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "bundle_count=$($include.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  native:
    name: Native ${{ matrix.rid }}
    if: ${{ !inputs.managed_only }}
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.native_matrix) }}

    env:
      SDL3CS_NATIVE_BUILD_PARALLEL_LEVEL: ${{ inputs.build_parallel_level }}

    steps:
      - name: Checkout SDL3-CS
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
            7.0.x

      - name: Install Windows native tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $missing = @()
          if (-not (Get-Command nasm -ErrorAction SilentlyContinue)) { $missing += 'nasm' }
          if (-not (Get-Command perl -ErrorAction SilentlyContinue)) { $missing += 'strawberryperl' }
          if ($missing.Count -gt 0) {
            if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
              throw "Chocolatey is required to install missing Windows tools: $($missing -join ', ')"
            }
            choco install @missing -y --no-progress
          }
          foreach ($path in @('C:\Program Files\NASM', 'C:\Strawberry\perl\bin')) {
            if (Test-Path -LiteralPath $path -PathType Container) {
              Add-Content -LiteralPath $env:GITHUB_PATH -Value $path
            }
          }

      - name: Install Linux native tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eux
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake make ninja-build pkg-config nasm bison patchelf libjson-perl \
            autoconf automake libtool \
            libasound2-dev libpulse-dev libaudio-dev libjack-dev libsndio-dev \
            libusb-1.0-0-dev libdbus-1-dev libudev-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxrender-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libpipewire-0.3-dev

      - name: Install Android NDK
        if: startsWith(matrix.rid, 'android-')
        shell: bash
        run: |
          set -eux
          test -n "${ANDROID_HOME:-}"
          ndk_version="27.2.12479018"
          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager" ]; then
            sdkmanager="$(find "$ANDROID_HOME/cmdline-tools" -path '*/bin/sdkmanager' -type f | sort | tail -n 1)"
          fi
          test -x "$sdkmanager"

          ndk="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [ -z "$ndk" ] || [ ! -f "$ndk/build/cmake/android.toolchain.cmake" ]; then
            ndk="$ANDROID_HOME/ndk/$ndk_version"
          fi

          if [ ! -f "$ndk/build/cmake/android.toolchain.cmake" ]; then
            existing_ndk="$(find "$ANDROID_HOME/ndk" -path '*/build/cmake/android.toolchain.cmake' -type f 2>/dev/null | sort | tail -n 1 || true)"
            if [ -n "$existing_ndk" ]; then
              ndk="$(dirname "$(dirname "$(dirname "$existing_ndk")")")"
            else
              for attempt in 1 2 3; do
                rm -rf "$ndk" "$ANDROID_HOME/.temp"
                yes | "$sdkmanager" --licenses >/dev/null || true
                if "$sdkmanager" "ndk;$ndk_version"; then
                  break
                fi
                if [ "$attempt" -eq 3 ]; then
                  exit 1
                fi
                sleep $((attempt * 10))
              done
            fi
          fi

          test -f "$ndk/build/cmake/android.toolchain.cmake"
          echo "ANDROID_NDK_HOME=$ndk" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk" >> "$GITHUB_ENV"

      - name: Install macOS native tools
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -eux
          brew update
          brew install nasm bison cpanminus
          cpanm --local-lib="$HOME/perl5" --notest JSON
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          echo "PERL5LIB=$HOME/perl5/lib/perl5:${PERL5LIB:-}" >> "$GITHUB_ENV"

      - name: Initialize native forks
        shell: pwsh
        run: ./.github/release-tools/Initialize-NativeForks.ps1 -Depth 1 -Retries 3

      - name: Build native bundle
        shell: pwsh
        run: |
          $buildParams = @{
            Rids = @('${{ matrix.rid }}')
            Clean = $true
            BuildParallelLevel = [int]'${{ inputs.build_parallel_level }}'
          }
          if ('${{ matrix.allow_cross_compile }}' -eq 'true') {
            $buildParams.AllowCrossCompile = $true
          }
          ./.github/release-tools/Invoke-NativeHostBuild.ps1 @buildParams

      - name: Smoke test ShaderCross DXC runtime
        if: startsWith(matrix.rid, 'linux-') || startsWith(matrix.rid, 'osx-')
        shell: pwsh
        run: |
          ./.github/release-tools/Test-ShaderCrossDxcRuntime.ps1 `
            -Rid '${{ matrix.rid }}' `
            -InstallRoot 'artifacts/release/native/SDL_shadercross/${{ matrix.rid }}/install'

      - name: Upload native bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-bundle-${{ matrix.rid }}
          path: artifacts/release/bundles/native-all-components-${{ matrix.rid }}.zip
          if-no-files-found: error

  assemble:
    name: Assemble NuGet packages
    if: ${{ !inputs.managed_only }}
    needs:
      - plan
      - native
    runs-on: windows-2025

    steps:
      - name: Checkout SDL3-CS
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
            7.0.x

      - name: Install Android .NET workload for bridge package
        shell: pwsh
        run: dotnet workload install android --source https://api.nuget.org/v3/index.json

      - name: Initialize native forks
        shell: pwsh
        run: ./.github/release-tools/Initialize-NativeForks.ps1 -Depth 1 -Retries 3

      - name: Download native bundles
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: native-bundle-*
          path: artifacts/release/bundles
          merge-multiple: true

      - name: Assemble packages
        shell: pwsh
        run: |
          $bundles = @(Get-ChildItem -LiteralPath 'artifacts/release/bundles' -Filter '*.zip' -File | Sort-Object Name)
          $expectedBundleCount = [int]'${{ needs.plan.outputs.bundle_count }}'
          if ($bundles.Count -ne $expectedBundleCount) {
            throw "Expected $expectedBundleCount native bundle(s), got $($bundles.Count)."
          }

          $params = @{
            PackageRevision = [int]'${{ inputs.package_revision }}'
            BundlePath = @($bundles | ForEach-Object { $_.FullName })
          }
          if ('${{ inputs.require_upstream_current }}' -eq 'true') {
            $params.RequireForksUpToDate = $true
            $params.CheckUpstream = $true
            $params.RequireUpstreamCurrent = $true
          }

          ./.github/release-tools/Invoke-ReleaseAssembly.ps1 @params

      - name: Export release assembly state
        shell: pwsh
        run: |
          $statePath = 'artifacts/release/release-assembly-state.zip'
          $stateRoot = 'artifacts/release/assembly-state-root'
          if (Test-Path -LiteralPath $statePath -PathType Leaf) {
            Remove-Item -LiteralPath $statePath -Force
          }
          if (Test-Path -LiteralPath $stateRoot) {
            Remove-Item -LiteralPath $stateRoot -Recurse -Force
          }
          . ./.github/release-tools/Release.Common.ps1
          $manifest = Get-ReleaseManifest
          $packageRevision = [int]'${{ inputs.package_revision }}'
          $nativeLibRoots = @(Get-ReleasePackageVersions -Manifest $manifest -PackageRevision $packageRevision |
            Where-Object { $_.Kind -eq 'native' } |
            ForEach-Object { Join-Path (Split-Path -Parent $_.Project) 'lib' } |
            Sort-Object -Unique)
          $stateItems = @(
            'artifacts/release/nuget',
            'artifacts/release/receipts'
          ) + $nativeLibRoots
          foreach ($item in $stateItems) {
            if (-not (Test-Path -LiteralPath $item)) {
              throw "Release assembly state path is missing: $item"
            }
          }
          foreach ($item in $stateItems) {
            $target = Join-Path $stateRoot $item
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $target) | Out-Null
            Copy-Item -LiteralPath $item -Destination $target -Recurse -Force
          }
          Compress-Archive -Path (Join-Path $stateRoot '*') -DestinationPath $statePath -Force

      - name: Validate release assembly state
        shell: pwsh
        run: |
          ./.github/release-tools/Test-ReleaseAssemblyState.ps1 `
            -PackageRevision ([int]'${{ inputs.package_revision }}') `
            -StatePath 'artifacts/release/release-assembly-state.zip'

      - name: Upload NuGet packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nuget-packages
          path: artifacts/release/nuget/*.nupkg
          if-no-files-found: error

      - name: Upload release assembly state
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assembly-state
          path: artifacts/release/release-assembly-state.zip
          if-no-files-found: error

  apple-consumer:
    name: Apple consumer ${{ matrix.name }}
    if: ${{ !inputs.managed_only }}
    needs: assemble
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arm64 simulators
            runner: macos-26
            rids: iossimulator-arm64,tvossimulator-arm64
          - name: x64 simulators
            runner: macos-26-intel
            rids: iossimulator-x64,tvossimulator-x64

    steps:
      - name: Checkout SDL3-CS
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
            7.0.x

      - name: Select Xcode 26.5
        shell: bash
        run: |
          set -eux
          sudo xcode-select -s /Applications/Xcode_26.5.app
          xcodebuild -version

      - name: Install Apple .NET workloads
        shell: bash
        run: |
          set -eux
          dotnet workload install ios tvos --source https://api.nuget.org/v3/index.json

      - name: Download NuGet packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nuget-packages
          path: artifacts/release/nuget

      - name: Build Apple consumer apps
        shell: pwsh
        run: |
          $rids = '${{ matrix.rids }}' -split ','
          ./.github/release-tools/Test-AppleConsumerPackageBuild.ps1 `
            -PackageRevision ([int]'${{ inputs.package_revision }}') `
            -PackageDir 'artifacts/release/nuget' `
            -Rids $rids `
            -Configuration Debug

  android-consumer:
    name: Android consumer packages
    if: ${{ !inputs.managed_only }}
    needs: assemble
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SDL3-CS
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
            7.0.x

      - name: Install Android .NET workload
        shell: bash
        run: |
          set -eux
          dotnet workload install android --source https://api.nuget.org/v3/index.json

      - name: Download NuGet packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nuget-packages
          path: artifacts/release/nuget

      - name: Build Android consumer apps
        shell: pwsh
        run: |
          $rids = 'android-arm,android-arm64,android-x86,android-x64' -split ','
          ./.github/release-tools/Test-AndroidConsumerPackageBuild.ps1 `
            -PackageRevision ([int]'${{ inputs.package_revision }}') `
            -PackageDir 'artifacts/release/nuget' `
            -Rids $rids

  publish:
    name: Publish release
    needs:
      - assemble
      - apple-consumer
      - android-consumer
    if: ${{ !inputs.managed_only && (inputs.publish_github || inputs.publish_nuget) }}
    runs-on: windows-2025
    environment: production
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout SDL3-CS
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
            7.0.x

      - name: Initialize native forks
        shell: pwsh
        run: ./.github/release-tools/Initialize-NativeForks.ps1 -Depth 1 -Retries 3

      - name: Download release assembly state
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-assembly-state
          path: artifacts/release/state

      - name: Import release assembly state
        shell: pwsh
        run: |
          . ./.github/release-tools/Release.Common.ps1
          $manifest = Get-ReleaseManifest
          $packageRevision = [int]'${{ inputs.package_revision }}'
          $nativeLibRoots = @(Get-ReleasePackageVersions -Manifest $manifest -PackageRevision $packageRevision |
            Where-Object { $_.Kind -eq 'native' } |
            ForEach-Object { Join-Path (Split-Path -Parent $_.Project) 'lib' } |
            Sort-Object -Unique)
          $statePaths = @(
            'artifacts/release/nuget',
            'artifacts/release/receipts'
          ) + $nativeLibRoots
          foreach ($path in $statePaths) {
            if (Test-Path -LiteralPath $path) {
              Remove-Item -LiteralPath $path -Recurse -Force
            }
          }
          Expand-Archive -LiteralPath 'artifacts/release/state/release-assembly-state.zip' -DestinationPath . -Force

      - name: Validate imported release assembly state
        shell: pwsh
        run: |
          ./.github/release-tools/Test-ReleaseAssemblyState.ps1 `
            -PackageRevision ([int]'${{ inputs.package_revision }}') `
            -StatePath '.'

      - name: NuGet trusted publishing login
        if: ${{ inputs.publish_nuget }}
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: nuget_login
        with:
          user: edwardgushchin

      - name: Publish selected targets
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
        run: |
          $params = @{
            PackageRevision = [int]'${{ inputs.package_revision }}'
          }
          if ('${{ inputs.publish_github }}' -eq 'true') {
            $params.GitHubRelease = $true
          }
          if ('${{ inputs.publish_nuget }}' -eq 'true') {
            $params.NuGetPush = $true
          }
          if ('${{ inputs.require_upstream_current }}' -eq 'true') {
            $params.RequireUpstreamCurrent = $true
          }

          ./.github/release-tools/Publish-Release.ps1 @params

  managed-build:
    name: Build and validate managed package
    if: ${{ inputs.managed_only }}
    runs-on: windows-2025

    steps:
      - name: Checkout SDL3-CS with release history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
            7.0.x

      - name: Validate managed-only release scope
        shell: pwsh
        env:
          PACKAGE_REVISION: ${{ inputs.package_revision }}
          NATIVE_PACKAGE_REVISION: ${{ inputs.native_package_revision }}
          BASE_RELEASE_REF: ${{ inputs.base_release_ref }}
        run: |
          ./.github/release-tools/Test-ManagedReleaseScope.ps1 `
            -PackageRevision ([int]$env:PACKAGE_REVISION) `
            -NativePackageRevision ([int]$env:NATIVE_PACKAGE_REVISION) `
            -BaseRef $env:BASE_RELEASE_REF `
            -CheckNuGet

      - name: Restore managed projects
        shell: pwsh
        run: |
          dotnet restore .\SDL3-CS\SDL3-CS.csproj --force --no-cache
          dotnet restore .\SDL3-CS.Tests\SDL3-CS.Tests.csproj --force --no-cache

      - name: Build managed wrapper and tests
        shell: pwsh
        run: |
          dotnet build .\SDL3-CS\SDL3-CS.csproj -c Release --no-restore /p:GeneratePackageOnBuild=false
          dotnet build .\SDL3-CS.Tests\SDL3-CS.Tests.csproj -c Release --no-restore

      - name: Restore published native runtime for managed tests
        shell: pwsh
        env:
          NATIVE_PACKAGE_REVISION: ${{ inputs.native_package_revision }}
        run: |
          ./.github/release-tools/Restore-ManagedReleaseTestRuntime.ps1 `
            -NativePackageRevision ([int]$env:NATIVE_PACKAGE_REVISION) `
            -Rid win-x64 `
            -Destination 'SDL3-CS.Tests/bin/Release/net8.0'

      - name: Run managed wrapper tests
        shell: pwsh
        run: dotnet run --project .\SDL3-CS.Tests\SDL3-CS.Tests.csproj -c Release --no-build --no-restore

      - name: Audit public wrapper XML documentation
        shell: pwsh
        run: ./.github/release-tools/Test-PublicWrapperXmlDocs.ps1 -SourceRoot .\SDL3-CS

      - name: Pack managed NuGet package
        shell: pwsh
        env:
          PACKAGE_REVISION: ${{ inputs.package_revision }}
        run: |
          ./.github/release-tools/Pack-NuGet.ps1 `
            -PackageRevision ([int]$env:PACKAGE_REVISION) `
            -OutputDir 'artifacts/release/nuget' `
            -ManagedOnly `
            -NoBuild

      - name: Validate managed NuGet package contents
        shell: pwsh
        env:
          PACKAGE_REVISION: ${{ inputs.package_revision }}
        run: |
          ./.github/release-tools/Test-NuGetPackageContents.ps1 `
            -PackageRevision ([int]$env:PACKAGE_REVISION) `
            -PackageDir 'artifacts/release/nuget' `
            -ManagedOnly

      - name: Upload managed NuGet package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: managed-nuget-package
          path: artifacts/release/nuget/SDL3-CS.*.nupkg
          if-no-files-found: error

  managed-publish:
    name: Publish managed package
    needs: managed-build
    if: ${{ inputs.managed_only && (inputs.publish_github || inputs.publish_nuget) }}
    runs-on: windows-2025
    environment: production
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout SDL3-CS with release history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Download managed NuGet package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: managed-nuget-package
          path: artifacts/release/nuget

      - name: NuGet trusted publishing login
        if: ${{ inputs.publish_nuget }}
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: managed_nuget_login
        with:
          user: edwardgushchin

      - name: Publish selected targets
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.managed_nuget_login.outputs.NUGET_API_KEY }}
          PACKAGE_REVISION: ${{ inputs.package_revision }}
          NATIVE_PACKAGE_REVISION: ${{ inputs.native_package_revision }}
          BASE_RELEASE_REF: ${{ inputs.base_release_ref }}
          PUBLISH_GITHUB: ${{ inputs.publish_github }}
          PUBLISH_NUGET: ${{ inputs.publish_nuget }}
        run: |
          $params = @{
            PackageRevision = [int]$env:PACKAGE_REVISION
            NativePackageRevision = [int]$env:NATIVE_PACKAGE_REVISION
            BaseReleaseRef = $env:BASE_RELEASE_REF
            PackageDir = 'artifacts/release/nuget'
            ManagedOnly = $true
          }
          if ($env:PUBLISH_GITHUB -eq 'true') {
            $params.GitHubRelease = $true
          }
          if ($env:PUBLISH_NUGET -eq 'true') {
            $params.NuGetPush = $true
          }

          ./.github/release-tools/Publish-Release.ps1 @params
